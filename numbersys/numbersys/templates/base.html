<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Number System Scanner{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f7f7f9;
      }
      .card-soft {
        border: 0;
        border-radius: 14px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.2px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <!-- Brand: go to dashboard if logged in else login -->
        <a class="navbar-brand brand" href="{% if user.is_authenticated %}/dashboard/{% else %}/login/{% endif %}">
          Number Scanner
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">
          {% if user.is_authenticated %}
            <span class="navbar-text small text-muted d-none d-sm-inline">
              {{ user.username }}
            </span>

            {% if user.is_staff %}
              <a class="btn btn-outline-primary btn-sm" href="{% url 'staff_users' %}">
                Admin Dashboard
              </a>
            {% endif %}

            <form method="post" action="{% url 'logout' %}" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-secondary btn-sm">
                Logout
              </button>
            </form>
          {% else %}
            <a class="btn btn-primary btn-sm" href="/login/">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
