{% extends "base.html" %}
{% block title %}Upload Document{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Upload Document</h4>
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'dashboard' %}">Back</a>
    </div>

    <div class="card card-soft p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label class="form-label">Select file (JPG/PNG/PDF)</label>
        {{ form.file }}
        {% if form.file.errors %}
          <div class="text-danger small mt-1">{{ form.file.errors }}</div>
        {% endif %}

        <button class="btn btn-primary w-100 mt-3">Upload</button>
      </form>
      <div class="text-muted small mt-3">
        Tip: Clear photo, good lighting, avoid blur.
      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll("input[type='file']").forEach(el => el.classList.add("form-control"));
</script>
{% endblock %}
